                <h2 id="知识点："><a href="#知识点：" class="headerlink" title="知识点："></a>知识点：</h2><figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><code class="hljs php"><span class="hljs-number">1</span>、php小知识<br><span class="hljs-number">2</span>、数据库操作<br><span class="hljs-number">3</span>、文件操作<br><span class="hljs-number">4</span>、cookie&amp;session<br><span class="hljs-number">5</span>、js前端&amp;Ajax<br><span class="hljs-number">6</span>、框架<br></code></pre></td></tr></table></figure>

<h3 id="php小知识"><a href="#php小知识" class="headerlink" title="php小知识"></a>php小知识</h3><figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><code class="hljs php"><span class="hljs-number">1</span>、变量符 $ 在双引号中才会被解析<br><br><span class="hljs-number">2</span>、GET传参(<span class="hljs-variable">$_GET</span>[’a’])：有参数即可，不强制要求GET请求<br>	POST传参(<span class="hljs-variable">$_POST</span>[’a’])：必须是POST方式请求<br>	<br><span class="hljs-number">3</span>、php写html代码（php文件）<br><span class="hljs-keyword">echo</span> <span class="hljs-string">&quot;&lt;h1&gt;tets&lt;/h1&gt;&quot;</span>  (php) = &lt;h1&gt;tets&lt;/h1&gt;(html)<br></code></pre></td></tr></table></figure>

<h3 id="php数据库操作"><a href="#php数据库操作" class="headerlink" title="php数据库操作"></a>php数据库操作</h3><figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><code class="hljs php"><span class="hljs-number">1</span>、连接数据库<br><br><span class="hljs-number">2</span>、数据库操作：增删改查<br></code></pre></td></tr></table></figure>

<h3 id="php文件操作"><a href="#php文件操作" class="headerlink" title="php文件操作"></a>php文件操作</h3><figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><code class="hljs php"><span class="hljs-number">1</span>、文件上传<br><span class="hljs-number">2</span>、文件下载<br><span class="hljs-number">3</span>、文件读取<br><span class="hljs-number">4</span>、文件包含<br><span class="hljs-number">5</span>、文件删除/修改<br>每个操作都有相关的函数，及其代码格式，网查即可<br></code></pre></td></tr></table></figure>

<h3 id="cookie-session"><a href="#cookie-session" class="headerlink" title="cookie&amp;session"></a>cookie&amp;session</h3><figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><code class="hljs php">都是用于身份验证<br><br>cookie保存在浏览器，可修改伪造<br>cookie安全：修改(修改绕过验证)、伪造(尝试伪造绕过)、盗取(xss)<br>判断cookie，获取： <span class="hljs-variable">$_COOKIE</span><br><br>session保存在服务器，利用的特殊方式设置，难以伪造<br>session安全：劫持<br></code></pre></td></tr></table></figure>

<h3 id="js前端-Ajax"><a href="#js前端-Ajax" class="headerlink" title="js前端&amp;Ajax"></a>js前端&amp;Ajax</h3><figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br></pre></td><td class="code"><pre><code class="hljs php">如何判断网站由js处理、搭建：<br><span class="hljs-number">1</span>、查看返回数据包的是否含json的数据<br><span class="hljs-number">2</span>、查看回显时间，eg:挑选选中恶意文件但是并未点击上传时就已经被警告<br><span class="hljs-number">3</span>、禁止js后网站会不会无法运行<br><br>直接查看源代码、查看网站显示js文件(多点击网络的功能点，才可加载更多<br>的js文件)<br><br>可以拷贝到本地，搭建后，白盒审计<br><br>假如全是使用js进行编辑的网站，burp可劫持返回的js响应(下图)，再交给浏览器<br>处理，可以修改修改相关的参数值进行绕过相关验证<br><br><span class="hljs-title function_ invoke__">Ajax</span>(js的一种数据交互方式)<br>会在js搭建网站中用于传递数据、参数及其值<br><br></code></pre></td></tr></table></figure>

<p><img src="https://prod-files-secure.s3.us-west-2.amazonaws.com/872af717-9657-424b-9fc7-5682f3608032/9069e6da-04cb-4ae1-91f7-426cb1bbbf6e/Untitled.png" srcset="/img/loading.gif" lazyload alt="Untitled"></p>
<h3 id="框架"><a href="#框架" class="headerlink" title="框架"></a>框架</h3><figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><code class="hljs php">判断框架：可以通过网站扫描、网站图标、网站框架报错(通过访问错误url等)<br><br><span class="hljs-number">1</span>、明确大概框架后，可以进一步搜索企业使用的框架版本<br><span class="hljs-number">2</span>、找源码，阅读相关的源码开发手册<br><span class="hljs-number">3</span>、源码确认框架版本<br><br>利用：<br><span class="hljs-number">1</span>、直接代码审计，挖框架漏洞(难)，如果成功就可以关联所有使用该框架的企业<br><span class="hljs-number">2</span>、历史框架漏洞<br><span class="hljs-number">3</span>、由于用户未使用框架的安全写法，而导致的漏洞<br></code></pre></td></tr></table></figure>

  Fluid.utils.createScript('https://lib.baomitu.com/anchor-js/4.3.1/anchor.min.js', function() {
    window.anchors.options = {
      placement: CONFIG.anchorjs.placement,
      visible  : CONFIG.anchorjs.visible
    };
    if (CONFIG.anchorjs.icon) {
      window.anchors.options.icon = CONFIG.anchorjs.icon;
    }
    var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
    var res = [];
    for (var item of el) {
      res.push('.markdown-body > ' + item.trim());
    }
    if (CONFIG.anchorjs.placement === 'left') {
      window.anchors.options.class = 'anchorjs-link-left';
    }
    window.anchors.add(res.join(', '));

    Fluid.events.registerRefreshCallback(function() {
      if ('anchors' in window) {
        anchors.removeAll();
        var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
        var res = [];
        for (var item of el) {
          res.push('.markdown-body > ' + item.trim());
        }
        if (CONFIG.anchorjs.placement === 'left') {
          anchors.options.class = 'anchorjs-link-left';
        }
        anchors.add(res.join(', '));
      }
    });
  });
